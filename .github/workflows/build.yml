name: Build Xposed Module APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          generate-job-summary: false

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.4

      - name: Download Xposed API
        run: |
          mkdir -p app/libs
          curl -L -o app/libs/api-82-sources.jar \
            https://api.xposed.info/repo/de/robv/android/xposed/api/82/api-82-sources.jar

      - name: Build APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SollinPlayer-Bypass-Xposed
          path: app/build/outputs/apk/release/*.apk
