plugins {
    id 'com.android.application'
}

android {
    compileSdk 34
    namespace 'com.ctf.bypass'

    defaultConfig {
        applicationId "com.ctf.bypass"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    compileOnly files('libs/api-82-sources.jar')
}
